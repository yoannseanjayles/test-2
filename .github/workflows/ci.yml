# CI (audit M-11) : build, typecheck et tests sur chaque push et PR.
# Le build précède le typecheck : `next build` génère next-env.d.ts
# (déclarations des imports d'images), absent d'un clone frais.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
